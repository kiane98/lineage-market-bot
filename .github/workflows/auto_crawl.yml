name: Lineage Market Auto Crawler

on:
  schedule:
    # 0 0 (9시 정각) 대신 05 0 (9시 5분)으로 변경! 
    # 정각에는 봇들이 너무 몰려서 깃허브가 스케줄을 씹는 경우가 많습니다.
    - cron: '5 0 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 최신 코드 가져오기
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 필요한 도구 및 크롬 설치
      run: |
        pip install selenium webdriver-manager beautifulsoup4
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 시세 크롤러 실행
      run: python crawler.py

    - name: 변경된 데이터 깃허브에 반영
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # 이전 찌꺼기가 남지 않게 확실히 파일만 추가
        git add market_stats.json
        
        # 변경사항이 있을 때만 커밋, 없으면 통과
        git commit -m "시세 업데이트: $(date +'%Y-%m-%d %H:%M')" || exit 0
        
        # 강제로 푸시하여 동기화
        git push origin main --force
