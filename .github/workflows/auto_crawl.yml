name: Lineage Market Auto Crawler

on:
  schedule:
    # 한국 시간(KST) 오전 9시 20분, 오후 9시 20분 실행
    - cron: '20 0,12 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # JSON 파일만 추가합니다. (사진 파일 등은 제외)
          git add market_stats.json
          
          # 한국 시간(KST)을 정확히 찍어서 커밋
          git commit -m "Auto Update: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST" || exit 0
          
          # 강제 푸시로 이력을 깔끔하게 유지 (형님 스타일)
          git push origin main --force
