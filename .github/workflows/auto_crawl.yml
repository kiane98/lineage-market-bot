name: Lineage Market Auto Crawler

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 최신 코드 가져오기
      uses: actions/checkout@v3
      with:
        ref: main
        fetch-depth: 0 # 모든 히스토리를 다 가져와서 충돌을 방지합니다.

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 필요한 도구 설치 (크롬 브라우저 등)
      run: |
        pip install selenium
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 시세 크롤러 실행
      run: python crawler.py

    - name: 변경된 데이터 깃허브에 반영
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # 1. 일단 현재 서버 상태를 무조건 내 것으로 받아옵니다.
        git fetch origin main
        git reset --soft origin/main
        
        # 2. 긁어온 시세 파일을 추가하고 커밋합니다.
        git add market_stats.json
        git commit -m "매주 정기 시세 업데이트: $(date +'%Y-%m-%d')" || exit 0
        
        # 3. 묻지도 따지지도 않고 서버에 밀어넣습니다.
        git push origin main --force
