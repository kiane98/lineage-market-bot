name: Lineage Market Auto Crawler

on:
  schedule:
    # 한국 시간(KST) 오전 9시 정각 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

# [핵심] Node.js 24 엔진 강제 활성화 (경고문에 나온 해결책 반영)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # [권한 설정] 자동 업데이트 시 봇이 파일을 쓸 수 있게 문을 열어줍니다.
    permissions:
      contents: write

    steps:
      - name: 저장소 최신 코드 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 최신 노드 엔진에 맞춰 파이썬도 최신형으로!

      - name: 필요한 도구 및 크롬 설치
        run: |
          pip install selenium webdriver-manager beautifulsoup4
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 시세 크롤러 실행
        run: python crawler.py

      - name: 변경된 데이터 깃허브에 반영
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@github.com"
          
          git add market_stats.json
          
          # 변경사항이 있을 때만 커밋
          git commit -m "시세 자동 업데이트: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # 메인 브랜치로 안전하게 전송
          git push origin main
