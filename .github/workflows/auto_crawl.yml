name: Lineage Market Auto Crawler

on:
  schedule:
    # 한국 시간(KST) 매일 오전 09:00에 실행 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 최신 코드 가져오기
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 필요한 도구 설치 (크롬 브라우저 등)
      run: |
        pip install selenium
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 시세 크롤러 실행
      run: python crawler.py

    - name: 변경된 데이터 깃허브에 반영
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # 변경된 파일 추가
        git add market_stats.json
        
        # 커밋 (변경 사항이 없으면 무시)
        git commit -m "매일 정기 시세 업데이트: $(date +'%Y-%m-%d')" || exit 0
        
        # 강제로 최신화
        git push origin main --force
