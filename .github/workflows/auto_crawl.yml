name: Lineage Market Auto Crawler

on:
  schedule:
    # 한국 시간(KST) 매일 오전 09:00에 실행 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 최신 코드 가져오기
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 필요한 도구 설치
      run: |
        pip install selenium
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 시세 크롤러 실행
      run: python crawler.py

    - name: 변경된 데이터 깃허브에 반영
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # [중요] 전체 파일을 add 하지 않고, 데이터 파일만 콕 집어서 추가합니다.
        # 이렇게 해야 'workflows' 권한 에러 없이 안전하게 업데이트됩니다.
        git add market_stats.json
        
        # 변경 사항이 있을 때만 커밋하고, 없으면 조용히 넘어갑니다.
        git commit -m "매일 정기 시세 업데이트: $(date +'%Y-%m-%d %H:%M')" || exit 0
        
        # 메인 브랜치로 강제 업데이트
        git push origin main --force
