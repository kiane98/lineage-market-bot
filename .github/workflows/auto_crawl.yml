name: Lineage Market Auto Crawler

on:
  schedule:
    # 한국 시간 기준 오전 05:15, 오후 17:15 실행
    - cron: '15 8,20 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일이 없어서 에러 나는 것을 방지하기 위해 빈 파일이라도 터치
          touch market_stats.json
          git add market_stats.json
          
          # 변경사항이 없을 때(exit code 1) 빌드가 멈추지 않도록 조치
          git commit -m "Auto Update: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M') KST" || exit 0
          
          git push origin main
