name: Lineage Market Auto Crawler

on:
  # 1. 자동 스케줄링 (한국 시간 오전 9시 정각)
  schedule:
    - cron: '0 0 * * *'
  
  # 2. 수동 실행 (테스트용 버튼)
  workflow_dispatch:

  # 3. 코드 수정 시 즉시 실행 (스케줄 활성화를 위한 자극)
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    # 봇에게 쓰기 권한을 명시적으로 부여 (가장 중요)
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager beautifulsoup4
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add market_stats.json
          
          # 변경사항이 있을 때만 커밋, 없으면 무시
          git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # 안전하게 푸시
          git push origin main
