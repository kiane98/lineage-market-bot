name: Lineage Market Auto Crawler

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 최신 코드 가져오기
      uses: actions/checkout@v3
      with:
        # 이 한 줄이 비서에게 "형님이 고친 최신 대본부터 챙겨라"고 지시하는 겁니다.
        ref: main

    - name: 파이썬 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 필요한 도구 설치 (크롬 브라우저 등)
      run: |
        pip install selenium
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 시세 크롤러 실행
      run: python crawler.py

    - name: 변경된 데이터 깃허브에 반영
      run: |
        git config --global user.name "MarketBot"
        git config --global user.email "bot@github.com"
        
        # 작업 직전에 다시 한번 서버 상태와 합치기
        git pull origin main --rebase
        
        git add market_stats.json
        git commit -m "매주 정기 시세 업데이트: $(date +'%Y-%m-%d')" || exit 0
        
        # 마지막으로 강제로 밀어넣기
        git push origin main --force
